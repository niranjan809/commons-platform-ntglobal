<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commons — Virtual Office</title>
  <link rel="stylesheet" href="style.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  JOIN SCREEN                                                           -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="join-screen" class="join-overlay">
  <div class="join-card">
    <div class="join-logo">🌿</div>
    <h1>Commons</h1>
    <p class="join-sub">Your team's virtual meadow</p>

    <!-- Zoho login -->
    <button id="zoho-login-btn" class="btn-zoho" type="button">
      <svg width="18" height="18" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px"><circle cx="20" cy="20" r="20" fill="#E42527"/><text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="18" font-family="Arial,sans-serif" font-weight="bold">Z</text></svg>
      Sign in with Zoho
    </button>
    <div id="zoho-user-badge" class="zoho-badge hidden"></div>

    <div class="divider"><span>or enter manually</span></div>

    <div class="form-group">
      <label>Your name</label>
      <input id="join-name" type="text" placeholder="e.g. Niran" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <input id="join-role" type="text" placeholder="e.g. Product Manager" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Team</label>
      <input id="join-team" type="text" placeholder="e.g. Growth" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Pick an avatar</label>
      <div class="avatar-picker" id="avatar-picker">
        <span class="av-opt selected" data-av="🐱">🐱</span>
        <span class="av-opt" data-av="🐶">🐶</span>
        <span class="av-opt" data-av="🦊">🦊</span>
        <span class="av-opt" data-av="🐺">🐺</span>
        <span class="av-opt" data-av="🐻">🐻</span>
        <span class="av-opt" data-av="🦁">🦁</span>
        <span class="av-opt" data-av="🐸">🐸</span>
        <span class="av-opt" data-av="🐼">🐼</span>
        <span class="av-opt" data-av="🐨">🐨</span>
        <span class="av-opt" data-av="🦝">🦝</span>
        <span class="av-opt" data-av="🐙">🐙</span>
        <span class="av-opt" data-av="🦋">🦋</span>
      </div>
    </div>
    <button id="join-btn" class="btn-primary">Enter the meadow →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  MAIN APP                                                              -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="app" class="app hidden">

  <!-- Left sidebar: member list -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">🌿 Commons</span>
    </div>

    <!-- Status selector -->
    <div class="status-bar" id="status-bar">
      <div class="status-self" id="status-self">
        <span id="self-avatar-label">🐱</span>
        <span id="self-name-label">You</span>
        <span class="dot dot-available" id="self-dot"></span>
      </div>
      <div class="status-controls">
        <select id="status-select" class="status-select">
          <option value="available">🟢 Available</option>
          <option value="busy">🔴 Busy</option>
          <option value="break">⏸ Break</option>
          <option value="offline">⚫ Away</option>
        </select>
      </div>

      <!-- Break composer (shows when "Break" is selected) -->
      <div id="break-composer" class="break-composer hidden">
        <select id="break-type" class="break-type-select">
          <option value="lunch">🍱 Lunch</option>
          <option value="coffee">☕ Coffee</option>
          <option value="brb">🚶 BRB</option>
          <option value="focus">🎧 Focus</option>
          <option value="call">📞 Call</option>
        </select>
        <label class="back-label">Back in</label>
        <select id="break-minutes" class="break-minutes-select">
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">1 hour</option>
          <option value="90">1.5 hrs</option>
          <option value="custom">Custom…</option>
        </select>
        <input id="break-custom-mins" type="number" min="1" max="480" placeholder="min"
               class="break-custom-input hidden" />
        <button id="break-confirm-btn" class="btn-sm btn-primary">Set</button>
        <div id="break-return-display" class="break-return-display hidden">
          Back at <span id="break-return-time"></span>
          <button id="break-cancel-btn" class="btn-sm btn-danger">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Members -->
    <div class="section-label">Team</div>
    <ul class="member-list" id="member-list"></ul>

    <!-- Quick Meet + Admin -->
    <div class="sidebar-footer">
      <button class="btn-meet" id="quick-meet-btn">📹 Start Zoho Meeting</button>
      <button class="btn-admin" id="admin-open-btn" title="Superuser: Attendance Log">📋</button>
    </div>
  </aside>

  <!-- Canvas meadow -->
  <main class="meadow-container">
    <canvas id="meadow-canvas"></canvas>

    <!-- Proximity toast -->
    <div id="proximity-toast" class="proximity-toast hidden">
      <div class="toast-inner">
        <span id="toast-avatar"></span>
        <div>
          <div id="toast-name"></div>
          <a id="toast-meet-link" href="#" target="_blank" class="toast-join">Join Meet →</a>
        </div>
        <button class="toast-close" onclick="dismissToast()">✕</button>
      </div>
    </div>
  </main>

  <!-- Right panel: chat -->
  <aside class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <span class="chat-title"># <span id="chat-channel-name">general</span></span>
      <div class="chat-channels">
        <button class="ch-btn active" data-ch="general"># general</button>
        <button class="ch-btn" data-ch="random"># random</button>
        <button class="ch-btn" data-ch="team"># team</button>
      </div>
      <div class="chat-search-bar">
        <input id="chat-search" type="text" placeholder="🔍 Search messages…" autocomplete="off" />
        <button id="chat-search-clear" class="btn-search-clear hidden">✕</button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div id="chat-no-results" class="chat-no-results hidden">No messages match your search.</div>
    <div class="chat-compose">
      <input id="chat-input" type="text" placeholder="Message #general…" autocomplete="off" />
      <button id="chat-send-btn" class="btn-send">↑</button>
    </div>
  </aside>

  <!-- Admin panel modal -->
  <div id="admin-modal" class="admin-modal hidden">
    <div class="admin-inner">
      <div class="admin-header">
        <span>📋 Attendance Log</span>
        <button id="admin-close" class="popover-close">✕</button>
      </div>
      <div id="admin-auth" class="admin-auth">
        <input id="admin-pwd-input" type="password" placeholder="Admin password" />
        <button id="admin-login-btn" class="btn-sm btn-primary">View Logs</button>
      </div>
      <div id="admin-content" class="hidden">
        <!-- Live Users -->
        <div class="admin-section-label">🟢 Live Users</div>
        <div class="admin-toolbar">
          <span id="admin-live-count"></span>
          <button id="admin-reset-btn" class="btn-sm btn-danger">⚠ Reset Room</button>
        </div>
        <div class="admin-table-wrap" style="max-height:160px">
          <table class="admin-table">
            <thead><tr><th>User</th><th>Role</th><th>Status</th><th></th></tr></thead>
            <tbody id="admin-live-tbody"></tbody>
          </table>
        </div>
        <!-- Attendance Log -->
        <div class="admin-section-label" style="margin-top:12px">📋 Attendance Log</div>
        <div class="admin-toolbar">
          <span id="admin-count"></span>
          <button id="admin-csv-btn" class="btn-sm btn-secondary">⬇ Export CSV</button>
          <button id="admin-refresh-btn" class="btn-sm btn-secondary">↺ Refresh</button>
        </div>
        <div class="admin-table-wrap">
          <table id="admin-table" class="admin-table">
            <thead><tr>
              <th>Time</th><th>User</th><th>Role</th><th>Event</th><th>Details</th>
            </tr></thead>
            <tbody id="admin-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Profile popover -->
<div id="profile-popover" class="profile-popover hidden">
  <button class="popover-close" id="popover-close-btn">✕</button>
  <div class="popover-avatar" id="pop-avatar"></div>
  <div class="popover-name" id="pop-name"></div>
  <div class="popover-role" id="pop-role"></div>
  <div class="popover-status" id="pop-status"></div>
  <div class="popover-team" id="pop-team"></div>
  <div class="popover-activity" id="pop-activity"></div>
  <div class="popover-links" id="pop-links"></div>
</div>

<script src="app.js"></script>
</body>
</html>
